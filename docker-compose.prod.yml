version: '3.8'

services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: smartprice
      POSTGRES_USER: smartprice_user
      POSTGRES_PASSWORD: smartprice_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - static_volume:/app/staticfiles
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=smartprice
      - DB_USER=smartprice_user
      - DB_PASSWORD=smartprice_password
      - DEBUG=False
    depends_on:
      - db
    restart: always

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
  static_volume:
