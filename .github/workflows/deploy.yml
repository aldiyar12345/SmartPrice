name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: smartprice
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 200723
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ./backend
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      env:
        DB_PASSWORD: 200723
      run: |
        python manage.py test

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
    - name: Install dependencies
      run: npm ci
    - name: Build
      run: npm run build

  deploy:
    needs: [test-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Deploy to DigitalOcean
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.DO_HOST }}
        username: ${{ secrets.DO_USERNAME }}
        port: 22
        key: ${{ secrets.DO_SSH_KEY }}
        envs: OPENROUTER_API_KEY
        script: |
          if [ ! -d ~/smartprice ]; then
            git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git ~/smartprice
          else
            cd ~/smartprice
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git pull origin main
          fi
          cd ~/smartprice
          mkdir -p backend
          if [ ! -f backend/.env ]; then
            echo "Creating default backend/.env"
            echo "SECRET_KEY=django-insecure-prod-$(openssl rand -hex 32)" > backend/.env
            echo "OPENROUTER_API_KEY=$OPENROUTER_API_KEY" >> backend/.env
          fi
          if command -v docker-compose &> /dev/null; then
            docker-compose -f docker-compose.prod.yml up -d --build
          else
            docker compose -f docker-compose.prod.yml up -d --build
          fi
