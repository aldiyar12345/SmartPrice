version: '3.8'

services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: smartprice
      POSTGRES_USER: smartprice_user
      POSTGRES_PASSWORD: smartprice_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    image: node:18
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"

volumes:
  postgres_data:
